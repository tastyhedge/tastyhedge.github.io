author: "Oleksandr Gituliar"
url: "https://tastyhedge.com"
baseurl: "/" # the subpath of your site, e.g. /blog
title: "TastyHedge"
logo: "/assets/img/logo/logo-192x192.png"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: /blog/:title

include:
  - .nojekyll

exclude:
  - Makefile
  - package.json
  - postcss.config.js
  - tailwind.config.js
  - yarn.lock

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  #  For Tailwind install, see https://mzrn.sh/2022/04/09/starting-a-blank-jekyll-site-with-tailwind-css-in-2022/
  - jekyll-postcss
  - jekyll-seo-tag
  - jekyll-sitemap

postcss:
  cache: false

#  Template variables
my:
  date_format: "%Y-%m-%d"
